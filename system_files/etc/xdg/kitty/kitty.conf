# Blueberry system-wide kitty configuration.
# Ported from ~/.dotfiles/home/common/kitty.nix.
# User overrides go in ~/.config/kitty/kitty.conf (kitty merges them).

# ---------------------------------------------------------------------------
# Font
# ---------------------------------------------------------------------------
font_family      JetBrainsMono Nerd Font
font_size        11
symbol_map U+E000-U+F8FF,U+F0000-U+FFFFD,U+100000-U+10FFFD Cascadia Mono NF

# ---------------------------------------------------------------------------
# Behavior
# ---------------------------------------------------------------------------
macos_option_as_cmd     yes
clear_all_shortcuts     yes
update_check_interval   0
cursor_shape            beam
scrollback_lines        200000

# Mouse
wheel_scroll_multiplier 5
touch_scroll_multiplier 3

# Window
remember_window_size    yes
window_padding_width    8

# Notifications
enable_audio_bell       no
bell_on_tab             no

# URLs
detect_urls             yes
url_style               curly
open_url_with           default

# Tabs
tab_bar_edge            bottom
tab_bar_style           fade

# Performance
repaint_delay           5
input_delay             1
sync_to_monitor         no

# ---------------------------------------------------------------------------
# Dracula palette
# ---------------------------------------------------------------------------
background              #1e1f28
foreground              #f8f8f2
cursor                  #bbbbbb
selection_background    #44475a
selection_foreground    #1e1f28
color0                  #000000
color8                  #545454
color1                  #ff5555
color9                  #ff5454
color2                  #50fa7b
color10                 #50fa7b
color3                  #f0fa8b
color11                 #f0fa8b
color4                  #bd92f8
color12                 #bd92f8
color5                  #ff78c5
color13                 #ff78c5
color6                  #8ae9fc
color14                 #8ae9fc
color7                  #bbbbbb
color15                 #ffffff

# ---------------------------------------------------------------------------
# Keybindings
# ---------------------------------------------------------------------------
map shift+enter         send_text all \e\r
map ctrl+left           send_text all \x1b[1;5D
map ctrl+right          send_text all \x1b[1;5C
map alt+left            send_text all \x1b[1;5D
map alt+right           send_text all \x1b[1;5C
map ctrl+delete         send_text all \x1bd\x7f

# Panes
map cmd+d               launch --dont-take-focus --location=vsplit --cwd=current
map cmd+shift+d         launch --dont-take-focus --location=hsplit --cwd=current

# Tabs
map ctrl+tab            next_tab
map ctrl+shift+tab      prev_tab
map cmd+h               neighboring_window left
map cmd+l               neighboring_window right
map cmd+j               neighboring_window down
map cmd+k               neighboring_window up
map cmd+1               goto_tab 1
map cmd+2               goto_tab 2
map cmd+3               goto_tab 3
map cmd+4               goto_tab 4
map cmd+5               goto_tab 5
map cmd+6               goto_tab 6
map cmd+7               goto_tab 7
map cmd+8               goto_tab 8
map cmd+9               goto_tab 9
map cmd+0               goto_tab 10
map ctrl+t              new_tab_with_cwd
map ctrl+w              close_tab
map ctrl+shift+i        set_tab_title
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Startup session lives in /etc/xdg/kitty/startup.session and is invoked
# by sway via `kitty --session startup.session` (kitty searches XDG paths).
