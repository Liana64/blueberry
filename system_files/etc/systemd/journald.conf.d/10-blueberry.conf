[Journal]
# Persist logs across reboots so `journalctl --boot=-1` and the
# `ujust anomalies` recipe can look back further than the current boot.
Storage=persistent

# Cap total disk use. 500 MiB is plenty for a desktop's history without
# eating into the rootfs; SystemKeepFree wins if disk pressure is high.
SystemMaxUse=500M
SystemKeepFree=1G

# Per-file rotation; smaller files mean faster grep and easier rotation.
SystemMaxFileSize=50M
