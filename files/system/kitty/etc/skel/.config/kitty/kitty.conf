font_family JetBrainsMono Nerd Font
font_size 11
cursor_shape beam
scrollback_lines 200000
startup_session startup.session

# Window
remember_window_size yes
window_padding_width 8

# Notifications
enable_audio_bell no
bell_on_tab no

# URLs
detect_urls yes
url_style curly
open_url_with default

# Tabs
tab_bar_edge bottom
tab_bar_style fade

# Performance
repaint_delay 10
input_delay 3
sync_to_monitor yes
update_check_interval 0

# Dracula theme
background #1e1f28
foreground #f8f8f2
cursor #bbbbbb
selection_background #44475a
selection_foreground #1e1f28
color0 #000000
color8 #545454
color1 #ff5555
color9 #ff5454
color2 #50fa7b
color10 #50fa7b
color3 #f0fa8b
color11 #f0fa8b
color4 #bd92f8
color12 #bd92f8
color5 #ff78c5
color13 #ff78c5
color6 #8ae9fc
color14 #8ae9fc
color7 #bbbbbb
color15 #ffffff

# Clear default shortcuts
clear_all_shortcuts yes

# Key bindings
map shift+enter send_text all \e\r
map ctrl+left send_text all \x1b[1;5D
map ctrl+right send_text all \x1b[1;5C
map alt+left send_text all \x1b[1;5D
map alt+right send_text all \x1b[1;5C
map ctrl+delete send_text all \x1bd\x7f

# Tabs
map ctrl+tab next_tab
map ctrl+shift+tab prev_tab
map ctrl+t new_tab_with_cwd
map ctrl+w close_tab
map ctrl+shift+i set_tab_title
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Panes (ctrl+shift to avoid conflict with sway's alt bindings)
map ctrl+shift+d launch --location=vsplit --cwd=current
map ctrl+shift+e launch --location=hsplit --cwd=current
map ctrl+shift+h neighboring_window left
map ctrl+shift+l neighboring_window right
map ctrl+shift+j neighboring_window down
map ctrl+shift+k neighboring_window up
map ctrl+shift+1 goto_tab 1
map ctrl+shift+2 goto_tab 2
map ctrl+shift+3 goto_tab 3
map ctrl+shift+4 goto_tab 4
map ctrl+shift+5 goto_tab 5
map ctrl+shift+6 goto_tab 6
